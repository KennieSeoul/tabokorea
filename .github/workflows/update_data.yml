name: Update KRX Market Data

on:
  # 자동 실행(cron)을 삭제하여 증권사 계정 차단 리스크를 방지합니다.
  # 이제 데이터 업데이트는 GitHub Actions 탭에서 'Run workflow' 버튼을 누를 때만 수행됩니다.
  workflow_dispatch: # 수동 실행 버튼만 유지

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run data fetcher
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_CD: ${{ secrets.KIS_ACCOUNT_CD }}
        run: python kis_fetch_300.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/krx_heatmap_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update KRX heatmap data [skip ci]" && git push)
