<!DOCTYPE html> <!-- HTML 문서 유형을 선언합니다. 이 문서는 HTML5 문서입니다. -->
<html lang="ko"> <!-- HTML 문서의 시작을 나타내며, 언어를 한국어로 설정합니다. -->
<head>
    <meta charset="UTF-8"> <!-- 문서의 문자 인코딩을 UTF-8로 설정합니다. 한글이 깨지지 않도록 합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일 기기에서도 화면이 잘 보이도록 뷰포트를 설정합니다. -->
    <title>한국 로또 번호 생성기</title> <!-- 웹사이트 탭에 표시될 제목입니다. -->
    <link rel="stylesheet" href="style.css"> <!-- 외부 CSS 파일을 연결하여 HTML 요소의 스타일을 지정합니다. -->
</head>
<body> <!-- 웹사이트의 실제 내용이 표시되는 부분입니다. -->
    <div class="container"> <!-- 웹사이트 콘텐츠를 감싸는 컨테이너입니다. 스타일링을 위해 사용됩니다. -->
        <button id="theme-toggle" class="theme-toggle">다크 모드</button> <!-- 테마 전환 버튼 -->
        <h1>한국 로또 번호 생성기</h1> <!-- 웹사이트의 메인 제목입니다. -->
        <div class="lotto-numbers" id="lotto-numbers"></div> <!-- 생성된 로또 번호가 표시될 영역입니다. JavaScript로 내용이 채워집니다. -->
        <button id="generate-btn">번호 생성</button> <!-- 클릭하면 새로운 로또 번호를 생성하는 버튼입니다. -->

        <hr class="divider"> <!-- 구분선 -->

        <section class="contact-section">
            <h3>제휴 및 문의</h3>
            <p>비즈니스 문의나 건의사항을 보내주세요.</p>
            <form action="https://formspree.io/f/xdalrawa" method="POST" id="contact-form">
                <!-- 메일 제목 커스텀 설정 -->
                <input type="hidden" name="_subject" value="타보코리아 제휴 및 문의 접수">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용 (예: 제휴 문의, 기능 제안 등)" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>

        <hr class="divider"> <!-- 구분선 -->

        <section class="comment-section">
            <h3>댓글 및 피드백</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                var disqus_config = function () {
                    this.page.url = window.location.href;  // 페이지의 고유 URL
                    this.page.identifier = 'tabokorea-main'; // 페이지의 고유 식별자
                };
                (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://tabokorea.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script> <!-- 외부 JavaScript 파일을 연결하여 웹사이트에 동적인 기능을 추가합니다. -->
</body>
</html>
